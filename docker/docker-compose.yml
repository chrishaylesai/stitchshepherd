services:
  app:
    image: node:22-bookworm-slim
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @stitchharbor/web dev"
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-stitchharbor}:${POSTGRES_PASSWORD:-stitchharbor}@postgres:5432/${POSTGRES_DB:-stitchharbor}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-stitchharbor}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_FORCE_PATH_STYLE: "${S3_FORCE_PATH_STYLE:-true}"
    ports:
      - "3000:3000"
    volumes:
      - ..:/app
      - pnpm-store:/root/.local/share/pnpm/store
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stitchharbor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stitchharbor}
      POSTGRES_DB: ${POSTGRES_DB:-stitchharbor}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-stitchharbor} -d $${POSTGRES_DB:-stitchharbor}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      S3_BUCKET: ${S3_BUCKET:-stitchharbor}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${S3_ACCESS_KEY_ID} $${S3_SECRET_ACCESS_KEY}; do sleep 1; done;
      mc mb --ignore-existing local/$${S3_BUCKET};
      "

volumes:
  postgres-data:
  minio-data:
  pnpm-store:
